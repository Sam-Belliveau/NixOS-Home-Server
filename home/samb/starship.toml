# ============================================================
#  Starship prompt — "sira" recreation
#  Honors the original two-line frame:
#      ─────╮ user@host  ‹branch› git-status        <right: dur/exit/time>
#       ╭───╯ ~/dir   lang-versions
#      ─╯ <you type here, like sira>
#  Original sira theme by "Tom"; ported to Starship + enriched.
# ============================================================

add_newline = true
palette = "sira"

format = """
[─────╮ ](frame)$username[@](at)$hostname $git_branch$git_status$git_state
[ ╭───╯ ](frame)$directory$python$nodejs$rust$golang$java$lua$php$ruby$package
[─╯ ](frame)"""

# Right-hand prompt (renders on the input line, like sira's RPROMPT)
right_format = """$cmd_duration$jobs$status$time"""

[palettes.sira]
frame = "bright-white"   # box-drawing frame = your normal (white) text, like sira
at = "245"               # the @ in user@host: grey, dimmer than the frame (256-color ramp)

# ---- identity (sira: green user@host, red when root) ----
[username]
show_always = true
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold green"
format = "[$hostname]($style)"

# ---- directory (sira: italic cyan %~) ----
[directory]
style = "italic cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo = false
home_symbol = "~"
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 Documents"
"Downloads" = " Downloads"
"Music" = "󰝚 Music"
"Pictures" = " Pictures"

# ---- git (sira: yellow ‹branch›) ----
[git_branch]
symbol = " "
style = "bold yellow"
format = "[‹$symbol$branch›]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold magenta"

# ---- python / virtualenv (sira: magenta (venv)) ----
[python]
symbol = " "
style = "bold magenta"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

# ---- language versions (only show inside relevant projects) ----
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[php]
symbol = " "
style = "bold purple"
format = "[$symbol($version )]($style)"

[ruby]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[package]
disabled = true

# ---- right-side status (sira: red exit code RPROMPT) ----
[cmd_duration]
min_time = 500
style = "bold yellow"
format = "[ $duration]($style) "

[jobs]
symbol = " "
style = "bold blue"
number_threshold = 1
format = "[$symbol$number]($style) "

[status]
disabled = false
symbol = "✘ "
not_found_symbol = "🔍 "
sigint_symbol = "🧱 "
signal_symbol = "⚡ "
style = "bold red"
format = "[$symbol$status]($style) "

[time]
disabled = false
time_format = "%R"
style = "dimmed white"
format = "[ $time]($style)"

# ---- prompt character ----
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"
